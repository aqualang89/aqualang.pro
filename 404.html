<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>404 — страница не найдена · aqualang</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0A0C0F" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="/fonts/lora.css">
<link rel="stylesheet" href="/styles/base.css" />
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px;cursor:auto}
  body button,body a{cursor:pointer}
  .wrap{max-width:640px;text-align:center}
  .num{font-family:"Lora",serif;font-weight:300;font-style:italic;font-size:clamp(120px,22vw,240px);color:var(--mint);line-height:1;letter-spacing:-.04em}
  h1{font-family:"Lora",serif;font-weight:300;font-size:clamp(28px,4vw,44px);letter-spacing:-.02em;margin-top:16px;color:var(--fg)}
  h1 .it{font-style:italic;color:var(--mint)}
  p{color:var(--fg-2);font-size:15px;line-height:1.55;margin-top:18px;max-width:440px;margin-left:auto;margin-right:auto}
  .actions{margin-top:36px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{padding:14px 22px;border-radius:99px;border:1px solid var(--line-2);font-family:"Lora",serif;font-size:16px;color:var(--fg);transition:background .3s,color .3s,border-color .3s}
  .btn:hover{background:var(--mint);color:var(--ink);border-color:var(--mint)}
  .btn.primary{background:var(--mint);color:var(--ink);border-color:var(--mint)}
  .btn.primary:hover{background:var(--mint-2);border-color:var(--mint-2)}
  .meta{margin-top:48px;font-family:ui-monospace,"Cascadia Mono",Menlo,monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3)}
</style>
</head>
<body>
  <main class="wrap">
    <div class="num">404</div>
    <h1>тут <span class="it">пусто</span>.</h1>
    <p>Страницы по этому адресу нет или она переехала. Возможно, ты перешёл по старой ссылке.</p>
    <div class="actions">
      <a href="/" class="btn primary">На главную →</a>
      <a href="/#contact" class="btn">Написать</a>
    </div>
    <div class="meta">// AQ-404 · ERR_NOT_FOUND</div>
  </main>
</body>
</html>
